name: "Make and tests"
description: "Make, unittest & integration test"

inputs:
  exercise:
    type: string
    required: true

runs:
  using: "composite"
  steps:
    - name: Сборка
      shell: bash
      run: |
        pushd "${{ inputs.exercise }}"
        make depends
        make release
        make debug
        make utest
        popd

    - name: Модульные тесты
      shell: bash
      run: |
        pushd "${{ inputs.exercise }}"
        make run_utest
        popd

    - name: Интеграционные тесты
      shell: bash
      run: |
        pushd "${{ inputs.exercise }}"
        make run_itest
        popd
